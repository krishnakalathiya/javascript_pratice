<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <h2 class="text-center mb-4">Task Manager</h2>

      <div class="card p-4 shadow">
        <form id="taskForm">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Task Title</label>
              <input type="text" id="title" class="form-control" placeholder="Enter task title"/>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Due Date</label>
              <input type="date" id="dueDate" class="form-control" />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="description" class="form-control" placeholder="Task description"></textarea>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Priority</label>
              <select id="priority" class="form-select">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </div>

          <button type="submit" class="btn btn-primary w-100">Add Task</button>
        </form>
      </div>

      <div class="mt-4">
        <div class="d-flex justify-content-between mb-3">
          <select id="filterPriority" class="form-select w-25">
            <option value="All">All Priority</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>

          <div class="col-md-4 mb-3">
              <input type="text" id="search" class="form-control" placeholder="Search task"/>
            </div>
          </div>
        </div>

        <ul id="taskList" class="list-group"></ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
