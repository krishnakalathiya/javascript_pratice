<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEasy | Premium E-Commerce</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./asset/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">ShopEasy</a>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="./index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="./cart.html">Cart <i class="bi bi-cart3"></i></a></li>
          <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="hero-section text-white text-center">
    <div class="container">
      <h1 class="display-3 fw-bold mb-3">Upgrade Your Lifestyle</h1>
      <p class="lead opacity-75">Curated premium products delivered to your doorstep.</p>
    </div>
  </header>

  <section class="container mb-5">
    <div class="bg-white p-4 rounded-4 shadow-sm border position-relative" style="z-index: 10;">
      <div class="row g-3 align-items-center">
        <div class="col-md-5">
          <div class="input-group">
            <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
            <input class="form-control bg-light border-0 shadow-none" type="text" id="search-input" placeholder="Search products...">
          </div>
        </div>
        <div class="col-md-3">
          <select class="form-select border-0 bg-light shadow-none" id="category-filter">
            <option value="all">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Home">Home</option>
            <option value="Sports">Sports</option>
            <option value="Books">Books</option>
          </select>
        </div>
        <div class="col-md-4">
          <select class="form-select border-0 bg-light shadow-none" id="sort-filter">
            <option value="all">Sort By</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="name">Name: A to Z</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <main class="container py-4">
    <h2 class="fw-bold mb-4">Our Products</h2>
    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="products_container"></div>
  </main>

  <footer class="bg-dark text-white py-5 mt-5">
    <div class="container text-center">
      <p class="mb-0 opacity-50">© 2026 ShopEasy. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/script.mjs"></script>
  <script type="module" src="./js/product.mjs"></script>
</body>
</html>
