<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopEasy | Premium E-Commerce</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./asset/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">ShopEasy</a>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./cart.html"
                >Cart <i class="bi bi-cart3"></i
              ></a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#" id="username-display"></a>
            </li>
            <li class="nav-item" id="logout-btn">
              <a class="nav-link active" aria-current="page" href="#">Logout</a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link active"
                aria-current="page"
                href="#"
                class="btn btn-primary"
                data-bs-target="#exampleModalToggle"
                data-bs-toggle="modal"
                >Login</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="hero-section text-white text-center">
      <div class="container">
        <h1 class="display-3 fw-bold mb-3">Upgrade Your Lifestyle</h1>
        <p class="lead opacity-75">
          Curated premium products delivered to your doorstep.
        </p>
      </div>
    </header>

    <section class="container mb-5">
      <div
        class="bg-white p-4 rounded-4 shadow-sm border position-relative"
        style="z-index: 10"
      >
        <div class="row g-3 align-items-center">
          <div class="col-md-5">
            <div class="input-group">
              <span class="input-group-text bg-light border-0"
                ><i class="bi bi-search"></i
              ></span>
              <input
                class="form-control bg-light border-0 shadow-none"
                type="text"
                id="search-input"
                placeholder="Search products..."
              />
            </div>
          </div>
          <div class="col-md-3">
            <select
              class="form-select border-0 bg-light shadow-none"
              id="category-filter"
            >
              <option value="all">All Categories</option>
              <option value="Electronics">Electronics</option>
              <option value="Clothing">Clothing</option>
              <option value="Home">Home</option>
              <option value="Sports">Sports</option>
              <option value="Books">Books</option>
            </select>
          </div>
          <div class="col-md-4">
            <select
              class="form-select border-0 bg-light shadow-none"
              id="sort-filter"
            >
              <option value="all">Sort By</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
              <option value="name">Name: A to Z</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <main class="container py-4">
      <h2 class="fw-bold mb-4">Our Products</h2>
      <div
        class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4"
        id="products_container"
      ></div>
    </main>

    <footer class="bg-dark text-white py-5 mt-5">
      <div class="container text-center">
        <p class="mb-0 opacity-50">© 2026 ShopEasy. All rights reserved.</p>
      </div>
    </footer>

    <!-- login and register model -->

    <div
      class="modal fade"
      id="exampleModalToggle"
      aria-hidden="true"
      aria-labelledby="exampleModalToggleLabel"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="fs-5 mx-auto my-0" id="exampleModalToggleLabel">
              Login Form
            </h1>
            <button
              type="button"
              class="btn-close m-0"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="formGroupExampleInput" class="form-label"
                >User Name</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput"
                placeholder="Enter username"
              />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Password</label
              >
              <input
                type="password"
                class="form-control"
                id="formGroupExampleInput2"
                placeholder="Enter password"
              />
            </div>
            <div class="mb-3 w-100">
              <button
                class="btn btn-primary w-100"
                id="login_btn"
                data-bs-target="#exampleModalToggle"
                data-bs-toggle="modal"
              >
                Login
              </button>
            </div>
          </div>
          <div class="modal-footer justify-content-between">
            <div class="mb-3">
              <label class="d-block mb-2">You are not registerd user?</label>
              <button
                class="btn btn-primary"
                data-bs-target="#exampleModalToggle2"
                data-bs-toggle="modal"
              >
                Register
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="exampleModalToggle2"
      aria-hidden="true"
      aria-labelledby="exampleModalToggleLabel2"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalToggleLabel2">
              Modal 2
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="formGroupExampleInput" class="form-label"
                >User Name</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExample_Input"
                placeholder="Enter username"
              />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Password</label
              >
              <input
                type="password"
                class="form-control"
                id="formGroupExample_Input2"
                placeholder="Enter password"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-primary"
              data-bs-target="#exampleModalToggle"
              data-bs-toggle="modal"
              id="register_btn"
            >
              Register
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/script.mjs"></script>
    <script type="module" src="./js/product.mjs"></script>
  </body>
</html>
