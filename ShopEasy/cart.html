<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | ShopEasy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="./asset/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="./index.html">ShopEasy</a>
    </div>
  </nav>

  <div class="container py-5 mt-4">
    <h2 class="fw-bold mb-4">Your Shopping Cart</h2>
    <div class="row g-4">
      <div class="col-lg-8">
        <div id="cart-item-container"></div>
        <div class="mt-4 d-flex justify-content-between">
          <a href="index.html" class="btn btn-outline-dark rounded-pill px-4">Continue Shopping</a>
          <button class="btn btn-outline-danger rounded-pill px-4" id="clear-cart-btn">Clear Cart</button>
        </div>
      </div>
      
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 sticky-top" style="top: 100px;" id="cart-summary" style="display: none;">
          <div class="card-body p-4">
            <h5 class="fw-bold mb-4">Order Summary</h5>
            <div class="d-flex justify-content-between mb-2"><span>Subtotal</span><span id="subtotal" class="fw-bold">$0.00</span></div>
            <div class="d-flex justify-content-between mb-2"><span>Tax (10%)</span><span id="tax" class="fw-bold">$0.00</span></div>
            <div class="d-flex justify-content-between mb-3"><span>Shipping</span><span id="shipping" class="text-success fw-bold">$5.00</span></div>
            <hr class="my-4">
            <div class="d-flex justify-content-between mb-4">
              <span class="h5 fw-bold">Grand Total</span>
              <span id="total" class="h5 fw-bold text-primary">$0.00</span>
            </div>
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" id="checkout-btn">Proceed to Checkout</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0">
        <div class="modal-body text-center p-5">
          <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
          <h2 class="fw-bold mt-3">Success!</h2>
          <p class="text-muted">Your order has been placed successfully.</p>
          <div class="bg-light p-3 rounded-3 mb-4">
            <p class="mb-1">Order ID: <span id="order-id" class="fw-bold"></span></p>
            <p class="mb-0">Total: <span id="order-total" class="fw-bold text-primary"></span></p>
          </div>
          <a href="index.html" class="btn btn-primary btn-lg rounded-pill px-5 w-100">Continue Shopping</a>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white py-5 mt-5">
    <div class="container text-center">
      <p class="opacity-50">© 2026 ShopEasy. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/cart.mjs"></script>
</body>
</html>
